<!DOCTYPE html>
<html>
<head>

<title>Generating Comic...</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b);
font-family:Arial;
color:white;
}

.container{
text-align:center;
}

.loader{
width:80px;
height:80px;
border:8px solid #334155;
border-top:8px solid #ff3b3b;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
margin-bottom:25px;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

h1{
margin-bottom:10px;
}

p{
color:#cbd5f5;
}

</style>

</head>

<body>

<div class="container">

<div class="loader"></div>

<h1>Generating Your Comic</h1>

<p>Please wait while AI creates your comic panels...</p>

</div>
<script src="/static/js/app.js"></script>
</body>
</html>
